<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Küchen-Zentrale</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👨‍🍳</text></svg>">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; }
        .header { text-align: center; font-size: 2.5rem; font-weight: bold; color: #1e293b; margin-bottom: 30px; }
        #kitchenDisplay { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        
        .order-ticket { 
            background: white; border-radius: 20px; padding: 25px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-left: 12px solid #2563eb;
            position: relative;
        }

        .ticket-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        
        .table-no { background: #1e293b; color: white; padding: 8px 15px; border-radius: 10px; font-size: 1.5rem; font-weight: bold; }
        
        .timer-container { text-align: right; }
        .order-time { font-size: 0.9rem; color: #64748b; margin-bottom: 5px; }
        .timer { font-family: 'Courier New', Courier, monospace; font-size: 2.5rem; font-weight: bold; color: #2563eb; }
        .timer.warning { color: #ef4444; }

        .product-list { font-size: 1.6rem; color: #334155; margin: 20px 0; font-weight: 500; min-height: 60px; }
        
        .btn-done { 
            width: 100%; padding: 15px; background: #22c55e; color: white; border: none; 
            border-radius: 15px; font-size: 1.5rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 0 #16a34a; transition: all 0.1s;
        }
        .btn-done:active { transform: translateY(4px); box-shadow: none; }

        .empty-msg { text-align: center; color: #94a3b8; font-size: 1.5rem; margin-top: 50px; font-style: italic; }
    </style>
</head>
<body>

    <div class="header">👨‍🍳 KÜCHEN-ZENTRALE</div>
    <div id="kitchenDisplay"></div>

<script>
    const firebaseConfig = { databaseURL: "https://mein-restaurante-default-rtdb.europe-west1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function updateCountdowns() {
        const now = Date.now();
        document.querySelectorAll('.order-ticket').forEach(ticket => {
            const start = parseInt(ticket.getAttribute('data-start'));
            const timerElement = ticket.querySelector('.timer');
            
            // 10 Minuten Limit (10 * 60 * 1000 ms)
            const limit = 600000; 
            const diff = now - start;
            const remaining = limit - diff;

            if (remaining <= 0) {
                timerElement.innerText = "00:00";
                timerElement.classList.add('warning');
                timerElement.style.fontSize = "1.8rem";
                timerElement.innerText = "ABGELAUFEN";
            } else {
                const mins = Math.floor(remaining / 60000);
                const secs = Math.floor((remaining % 60000) / 1000);
                timerElement.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            }
        });
    }

    db.ref('kitchenOrders').on('value', snapshot => {
        const orders = snapshot.val();
        const display = document.getElementById('kitchenDisplay');
        display.innerHTML = "";
        
        if (!orders) {
            display.innerHTML = '<div class="empty-msg">Keine offenen Bestellungen...</div>';
            return;
        }

        Object.keys(orders).forEach(id => {
            const o = orders[id];
            display.innerHTML += `
                <div class="order-ticket" data-start="${o.timestamp}">
                    <div class="ticket-top">
                        <div class="table-no">TISCH ${o.table}</div>
                        <div class="timer-container">
                            <div class="order-time">${o.time} Uhr</div>
                            <div class="timer">10:00</div>
                        </div>
                    </div>
                    <div class="product-list">${o.product}</div>
                    <button class="btn-done" onclick="done('${id}')">ERLEDIGT ✓</button>
                </div>`;
        });
    });

    // Jede Sekunde aktualisieren
    setInterval(updateCountdowns, 1000);

    window.done = id => db.ref('kitchenOrders/' + id).remove();
</script>
</body>
</html>
