<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestellung</title>
    <meta charset="UTF-8">
    <title>Bestellung</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --secondary: #1e293b; --success: #22c55e; --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; border: 1px solid #e2e8f0; }
        h2 { color: var(--secondary); border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; margin-top: 0; text-align: center; }
        .section-title { font-weight: bold; color: var(--primary); margin-top: 20px; margin-bottom: 5px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        select, input { width: 100%; padding: 12px; margin: 5px 0; border: 1.5px solid #cbd5e1; border-radius: 8px; font-size: 16px; background: white; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; margin-bottom: 15px; font-weight: bold; }
        .btn-send { background: var(--success); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 18px; font-weight: bold; margin-top: 25px; box-shadow: 0 4px 6px rgba(34, 197, 94, 0.3); }
        #basket { background: #f8fafc; border-radius: 8px; padding: 15px; margin-top: 20px; border: 2px dashed #cbd5e1; }
        .basket-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #e2e8f0; font-size: 16px; }
        .qty-controls { display: flex; align-items: center; gap: 10px; }
        .btn-qty { background: #e2e8f0; border: none; border-radius: 6px; width: 30px; height: 30px; cursor: pointer; font-weight: bold; font-size: 18px; color: var(--secondary); display: flex; align-items: center; justify-content: center; }
        .btn-clear { background: #94a3b8; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; margin-top: 10px; width: 100%; }
    </style>
</head>
<body>
<div class="card">
    <h2>📝 Bestellungen</h2>
    <input type="number" id="tableNumber" placeholder="Tisch-Nr." min="1">
    <div class="section-title">🥤 Getränke</div>
    <select id="selectGetraenke"><option value="" disabled selected>Wählen...</option></select>
    <button class="btn-add" onclick="addToBasket('selectGetraenke')">+ Hinzufügen</button>
    <div class="section-title">🍕 Speisen</div>
    <select id="selectSpeisen"><option value="" disabled selected>Wählen...</option></select>
    <button class="btn-add" onclick="addToBasket('selectSpeisen')">+ Hinzufügen</button>
    <div class="section-title">🍰 Nachspeisen</div>
    <select id="selectNachspeisen"><option value="" disabled selected>Wählen...</option></select>
    <button class="btn-add" onclick="addToBasket('selectNachspeisen')">+ Hinzufügen</button>
    <div id="basket">
        <div id="basketList"><span>Warenkorb leer</span></div>
        <button class="btn-clear" onclick="clearBasket()">Leeren</button>
    </div>
    <button class="btn-send" onclick="sendOrder()">🚀 AN DIE KÜCHE SCHICKEN</button>
</div>
<script>
    const firebaseConfig = { databaseURL: "https://mein-restaurante-default-rtdb.europe-west1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentBasket = {};

    db.ref('restaurantMenu').on('value', (snapshot) => {
        const menu = snapshot.val();
        const sG = document.getElementById('selectGetraenke'), sS = document.getElementById('selectSpeisen'), sN = document.getElementById('selectNachspeisen');
        sG.innerHTML = sS.innerHTML = sN.innerHTML = '<option value="" disabled selected>Wählen...</option>';
        if (menu) {
            Object.values(menu).forEach(item => {
                let opt = document.createElement('option');
                opt.value = opt.text = item.name;
                if(item.cat === "G") sG.appendChild(opt); else if(item.cat === "N") sN.appendChild(opt); else sS.appendChild(opt);
            });
        }
    });

    function addToBasket(id) {
        const val = document.getElementById(id).value;
        if (!val) return;
        currentBasket[val] = (currentBasket[val] || 0) + 1;
        updateUI();
    }

    function changeQty(name, d) {
        currentBasket[name] += d;
        if (currentBasket[name] <= 0) delete currentBasket[name];
        updateUI();
    }

    function updateUI() {
        const l = document.getElementById('basketList'), keys = Object.keys(currentBasket);
        l.innerHTML = keys.length ? keys.map(n => `<div class="basket-item"><span>${n}</span><div class="qty-controls"><button class="btn-qty" onclick="changeQty('${n}',-1)">-</button><b>${currentBasket[n]}</b><button class="btn-qty" onclick="changeQty('${n}',1)">+</button></div></div>`).join("") : "Warenkorb leer";
    }

    function clearBasket() { currentBasket = {}; updateUI(); }

    function sendOrder() {
        const t = document.getElementById('tableNumber').value, items = Object.keys(currentBasket);
        if (!t || !items.length) return alert("Fehler!");
        db.ref('kitchenOrders').push({
            product: items.map(n => `${currentBasket[n]}x ${n}`).join(", "),
            table: t,
            time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            timestamp: Date.now()
        }).then(() => { clearBasket(); alert("Gesendet!"); });
    }
</script>
</body>
</html>
